<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SenSante - Pre-diagnostic</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <header class="bg-blue-600 text-white py-4 shadow-lg">
        <div class="max-w-4xl mx-auto px-4">
            <h1 class="text-2xl font-bold">SenSante</h1>
            <p class="text-blue-100 text-sm">Assistant pre-diagnostic medical</p>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <section id="form-section" class="bg-white rounded-xl shadow-md p-6">
                <h2 class="text-xl font-bold text-gray-800 mb-4">Symptomes du patient</h2>

                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nom (optionnel)</label>
                    <input type="text" id="nom" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Ex: Awa">
                </div>

                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Age</label>
                    <input type="number" id="age" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Ex: 28" min="0" max="120">
                </div>

                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Sexe</label>
                    <select id="sexe" class="w-full border border-gray-300 rounded-lg p-2">
                        <option value="F">Feminin</option>
                        <option value="M">Masculin</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Temperature (°C)</label>
                    <input type="number" id="temperature" step="0.1" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Ex: 38.5" min="35" max="42">
                </div>

                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tension systolique</label>
                    <input type="number" id="tension_sys" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Ex: 120" min="60" max="250">
                </div>

                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Symptomes</label>
                    <div class="space-y-2">
                        <label class="flex items-center">
                            <input type="checkbox" id="toux" class="rounded text-blue-600 mr-2">
                            <span class="text-gray-700">Toux</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" id="fatigue" class="rounded text-blue-600 mr-2">
                            <span class="text-gray-700">Fatigue</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" id="maux_tete" class="rounded text-blue-600 mr-2">
                            <span class="text-gray-700">Maux de tete</span>
                        </label>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Region</label>
                    <select id="region" class="w-full border border-gray-300 rounded-lg p-2">
                        <option value="Dakar">Dakar</option>
                        <option value="Thies">Thies</option>
                        <option value="Saint-Louis">Saint-Louis</option>
                        <option value="Ziguinchor">Ziguinchor</option>
                        <option value="Tambacounda">Tambacounda</option>
                        <option value="Kaolack">Kaolack</option>
                        <option value="Diourbel">Diourbel</option>
                        <option value="Fatick">Fatick</option>
                        <option value="Kolda">Kolda</option>
                        <option value="Matam">Matam</option>
                        <option value="Kedougou">Kedougou</option>
                        <option value="Louga">Louga</option>
                    </select>
                </div>

                <button type="button" onclick="diagnostiquer()" id="btn-diag" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition duration-200 shadow-md">Diagnostiquer</button>
            </section>

            <section id="result-section" class="bg-white rounded-xl shadow-md p-6 text-center text-gray-400">
                <div>
                    <p class="text-4xl mb-3">&#129658;</p>
                    <p class="font-medium">Remplissez le formulaire</p>
                    <p class="text-sm mt-1">puis cliquez sur Diagnostiquer</p>
                </div>
            </section>
        </div>
    </main>

    <footer class="text-center text-gray-400 text-sm py-4">SenSante v0.3 - ESP/UCAD - L2 GLSI 2026</footer>

    <script>
        const API_URL = "";
        const historique = [];

        function renderHistorique() {
            const histHtml = historicalTableHtml();
            const section = document.getElementById("result-section");
            // append or replace history container
            const existing = document.getElementById('history-table');
            if (existing) existing.remove();
            section.insertAdjacentHTML('beforeend', histHtml);
        }

        function clearHistorique() {
            historique.length = 0;
            const existing = document.getElementById('history-table');
            if (existing) existing.remove();
        }

        function historicalTableHtml() {
            if (historique.length === 0) return '';
            const rows = historique.map(h => `
                <tr class="border-b">
                    <td class="px-2 py-1 text-sm">${h.nom || '—'}</td>
                    <td class="px-2 py-1 text-sm font-medium">${h.diagnostic}</td>
                    <td class="px-2 py-1 text-sm">${Math.round(h.probabilite*100)}%</td>
                </tr>`).join('');
            return `
                <div id="history-table" class="mt-4 bg-white rounded-lg p-3">
                    <div class="flex items-center justify-between mb-2">
                        <h3 class="text-sm font-semibold text-gray-700">Historique (5 derniers)</h3>
                        <button onclick="clearHistorique()" class="text-xs text-red-600 hover:underline">Vider</button>
                    </div>
                    <table class="w-full text-left text-sm">
                        <thead class="text-gray-500 text-xs uppercase">
                            <tr>
                                <th class="px-2 py-1">Nom</th>
                                <th class="px-2 py-1">Diagnostic</th>
                                <th class="px-2 py-1">Probabilité</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${rows}
                        </tbody>
                    </table>
                </div>`;
        }

        async function diagnostiquer() {
            const patient = {
                nom: document.getElementById("nom") ? document.getElementById("nom").value : '',
                age: parseInt(document.getElementById("age").value, 10),
                sexe: document.getElementById("sexe").value,
                temperature: parseFloat(document.getElementById("temperature").value),
                tension_sys: parseInt(document.getElementById("tension_sys").value, 10),
                toux: document.getElementById("toux").checked,
                fatigue: document.getElementById("fatigue").checked,
                maux_tete: document.getElementById("maux_tete").checked,
                region: document.getElementById("region").value,
            };

            if (!Number.isInteger(patient.age) || Number.isNaN(patient.temperature) || Number.isNaN(patient.tension_sys)) {
                afficherErreur("Veuillez remplir tous les champs.");
                return;
            }

            afficherChargement();

            try {
                const response = await fetch(`${API_URL}/predict`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(patient),
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail ? JSON.stringify(err.detail) : "Erreur serveur");
                }

                const resultat = await response.json();
                afficherResultat(resultat, patient.nom);
            } catch (error) {
                afficherErreur("Erreur de connexion : " + error.message);
            }
        }

        function afficherChargement() {
            const section = document.getElementById("result-section");
            section.innerHTML = `
                <div class="bg-white rounded-xl shadow-md p-6 text-center">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
                    <p class="text-gray-500">Analyse en cours...</p>
                </div>`;
        }

        function afficherResultat(r) {
// ... (code existant du Lab 4 pour
// afficher diagnostic + barre) ...
// NOUVEAU : appeler /explain automatiquement
demanderExplication(r);
}
async function demanderExplication(diagnostic_data) {
// Recuperer les donnees du formulaire
const explainData = {
diagnostic: diagnostic_data.diagnostic,
probabilite: diagnostic_data.probabilite,
age: parseInt(
document.getElementById("age").value),
sexe: document.getElementById("sexe").value,
temperature: parseFloat(
document.getElementById("temperature")
.value),
region:
document.getElementById("region").value
};
// Zone d'explication dans le result-section
const section =
document.getElementById("result-section");
// Ajouter un placeholder
const explDiv = document.createElement("div");
explDiv.id = "explication-zone";
explDiv.innerHTML = `
<div class="mt-4 bg-purple-50 rounded-lg p-4
border border-purple-200">
<p class="text-sm text-purple-600
font-medium mb-2">
Explication (Llama 3)</p>
<p class="text-gray-500 text-sm
animate-pulse">
Generation en cours...</p>
</div>`;
section.querySelector(
".bg-white").appendChild(explDiv);
try {
    const response = await fetch(
API_URL + "/explain", {
method: "POST",
headers:
{"Content-Type": "application/json"},
body: JSON.stringify(explainData)
});
if (response.ok) {
const result = await response.json();
explDiv.innerHTML = `
<div class="mt-4 bg-purple-50
rounded-lg p-4 border
border-purple-200">
<p class="text-sm text-purple-600
font-medium mb-2">
Explication (Llama 3)</p>
<p class="text-gray-700 text-sm
leading-relaxed">
${result.explication}</p>
</div>`;
}
} catch (error) {
explDiv.innerHTML = `
<div class="mt-4 bg-gray-50 rounded-lg
p-3">
<p class="text-gray-400 text-sm">
Explication non disponible.</p>
</div>`;
}
}   

        function afficherErreur(msg) {
            const section = document.getElementById("result-section");
            section.innerHTML = `
                <div class="bg-red-50 border border-red-200 rounded-xl p-6">
                    <p class="text-red-700 font-medium">${msg}</p>
                    <p class="text-red-500 text-sm mt-2">Verifiez votre connexion et reessayez.</p>
                </div>`;
        }
    </script>
</body>
</html>
